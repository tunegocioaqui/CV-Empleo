<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Constructor de CV Profesional</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1e3a5f;
      --accent: #2e86de;
      --light: #f0f4f8;
      --white: #ffffff;
      --text: #2d3748;
      --muted: #718096;
      --border: #e2e8f0;
      --success: #38a169;
      --bubble-user: #2e86de;
      --bubble-bot: #ffffff;
      --radius: 18px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2e86de 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px;
    }

    /* HEADER */
    .header {
      text-align: center;
      color: white;
      margin-bottom: 20px;
      padding-top: 10px;
    }
    .header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header p {
      font-size: 0.95rem;
      opacity: 0.85;
      margin-top: 4px;
    }

    /* PROGRESS BAR */
    .progress-wrap {
      width: 100%;
      max-width: 740px;
      margin-bottom: 16px;
    }
    .progress-labels {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .progress-labels span {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.7);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .progress-labels span.active {
      color: #fff;
      font-weight: 700;
    }
    .progress-bar-bg {
      height: 6px;
      background: rgba(255,255,255,0.25);
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #fff;
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    /* CHAT CONTAINER */
    .chat-container {
      width: 100%;
      max-width: 740px;
      background: var(--light);
      border-radius: 24px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 520px;
      max-height: 72vh;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    /* BUBBLES */
    .bubble-wrap {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .bubble-wrap.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 700;
    }
    .avatar.bot { background: var(--primary); color: white; }
    .avatar.user { background: var(--accent); color: white; }

    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 0.93rem;
      color: var(--text);
    }
    .bubble.bot {
      background: var(--white);
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .bubble.user {
      background: var(--bubble-user);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .bubble strong { font-weight: 600; }
    .bubble ul { padding-left: 18px; margin-top: 6px; }
    .bubble ul li { margin-bottom: 4px; }
    .bubble .section-tag {
      display: inline-block;
      background: var(--light);
      color: var(--primary);
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 2px 8px;
      border-radius: 20px;
      margin-bottom: 8px;
    }
    .bubble .tip {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 8px;
      font-style: italic;
    }

    /* TYPING INDICATOR */
    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      background: white;
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      width: fit-content;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .typing span {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* QUICK REPLY CHIPS */
    .chips-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 20px 4px;
    }
    .chip {
      background: white;
      border: 2px solid var(--accent);
      color: var(--accent);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .chip:hover { background: var(--accent); color: white; }

    /* INPUT AREA */
    .input-area {
      padding: 12px 16px;
      background: white;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-area textarea {
      flex: 1;
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 0.92rem;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
      color: var(--text);
    }
    .input-area textarea:focus { border-color: var(--accent); }
    .input-area textarea::placeholder { color: var(--muted); }
    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--primary); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn svg { fill: white; }

    /* CV PREVIEW PANEL */
    .cv-preview-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .cv-preview-overlay.open { display: flex; }
    .cv-preview-modal {
      background: white;
      border-radius: 20px;
      width: 100%;
      max-width: 820px;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .cv-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }
    .cv-modal-header h2 { font-size: 1.1rem; color: var(--primary); }
    .cv-modal-header button {
      background: none; border: none; cursor: pointer;
      font-size: 1.5rem; color: var(--muted); line-height: 1;
    }
    .cv-modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    .cv-modal-footer {
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 9px 18px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #162d4a; }
    .btn-secondary { background: var(--light); color: var(--primary); border: 2px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #2f855a; }

    /* ========================
       PLANTILLAS DE CV
    ======================== */

    /* PLANTILLA A — Ejecutivo Clásico */
    .cv-a {
      font-family: 'Georgia', serif;
      color: #1a1a2e;
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 48px;
      background: white;
    }
    .cv-a .cv-name {
      font-size: 2rem;
      font-weight: 700;
      color: #1e3a5f;
      letter-spacing: -0.5px;
      text-align: center;
    }
    .cv-a .cv-title {
      font-size: 1rem;
      color: #2e86de;
      text-align: center;
      margin-top: 4px;
      font-style: italic;
    }
    .cv-a .cv-contact {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 10px;
      font-size: 0.82rem;
      color: #555;
    }
    .cv-a .cv-divider {
      border: none;
      border-top: 2px solid #1e3a5f;
      margin: 18px 0 14px;
    }
    .cv-a .cv-section-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #1e3a5f;
      margin-bottom: 10px;
    }
    .cv-a .cv-job-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
    .cv-a .cv-company { font-weight: 700; font-size: 0.95rem; }
    .cv-a .cv-dates { font-size: 0.8rem; color: #666; }
    .cv-a .cv-role { font-style: italic; font-size: 0.92rem; color: #1e3a5f; font-weight: 700; margin-bottom: 6px; }
    .cv-a ul { padding-left: 18px; }
    .cv-a ul li { font-size: 0.87rem; margin-bottom: 4px; line-height: 1.5; }
    .cv-a .cv-skills-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .cv-a .cv-skill-chip {
      background: #e8f0fe;
      color: #1e3a5f;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .cv-a .cv-edu-line { font-size: 0.88rem; margin-bottom: 3px; }

    /* PLANTILLA B — Moderno Dividido */
    .cv-b {
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      max-width: 740px;
      margin: 0 auto;
      background: white;
      min-height: 900px;
    }
    .cv-b .cv-sidebar {
      width: 240px;
      flex-shrink: 0;
      background: #1e3a5f;
      color: white;
      padding: 36px 22px;
    }
    .cv-b .cv-main { flex: 1; padding: 36px 28px; }
    .cv-b .cv-name { font-size: 1.5rem; font-weight: 700; color: white; line-height: 1.2; }
    .cv-b .cv-title { font-size: 0.82rem; color: #90caf9; margin-top: 5px; font-weight: 500; }
    .cv-b .cv-sidebar-section { margin-top: 28px; }
    .cv-b .cv-sidebar-title {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #90caf9;
      font-weight: 700;
      margin-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding-bottom: 5px;
    }
    .cv-b .cv-contact-item { font-size: 0.8rem; margin-bottom: 6px; opacity: 0.9; word-break: break-all; }
    .cv-b .cv-skill-item {
      background: rgba(255,255,255,0.1);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.78rem;
      margin-bottom: 5px;
    }
    .cv-b .cv-main-section { margin-bottom: 24px; }
    .cv-b .cv-section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #2e86de;
      border-bottom: 2px solid #2e86de;
      padding-bottom: 4px;
      margin-bottom: 14px;
    }
    .cv-b .cv-job-header { display: flex; justify-content: space-between; }
    .cv-b .cv-company { font-weight: 700; font-size: 0.92rem; color: #1e3a5f; }
    .cv-b .cv-dates { font-size: 0.78rem; color: #718096; }
    .cv-b .cv-role { font-size: 0.88rem; color: #1e3a5f; font-weight: 700; margin-bottom: 6px; }
    .cv-b ul { padding-left: 16px; }
    .cv-b ul li { font-size: 0.84rem; margin-bottom: 4px; line-height: 1.5; color: #2d3748; }
    .cv-b .cv-edu-line { font-size: 0.86rem; margin-bottom: 3px; color: #2d3748; }
    .cv-b .cv-summary { font-size: 0.87rem; line-height: 1.65; color: #4a5568; }

    /* PLANTILLA C — Minimalista Bold */
    .cv-c {
      font-family: 'Segoe UI', sans-serif;
      max-width: 700px;
      margin: 0 auto;
      background: white;
    }
    .cv-c .cv-header-band {
      background: #1e3a5f;
      padding: 30px 40px;
    }
    .cv-c .cv-name { font-size: 2.1rem; font-weight: 800; color: white; letter-spacing: -1px; }
    .cv-c .cv-title { font-size: 1rem; color: #90caf9; margin-top: 4px; }
    .cv-c .cv-contact {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 12px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.8);
    }
    .cv-c .cv-body { padding: 28px 40px; }
    .cv-c .cv-section { margin-bottom: 26px; }
    .cv-c .cv-section-title {
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      color: #1e3a5f;
      border-bottom: 3px solid #2e86de;
      padding-bottom: 5px;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }
    .cv-c .cv-job-header { display: flex; justify-content: space-between; margin-bottom: 2px; }
    .cv-c .cv-company { font-weight: 700; font-size: 0.95rem; color: #1a1a2e; }
    .cv-c .cv-dates { font-size: 0.8rem; color: #718096; font-weight: 600; }
    .cv-c .cv-role { font-size: 0.9rem; color: #1e3a5f; font-weight: 800; margin-bottom: 7px; }
    .cv-c ul { padding-left: 18px; }
    .cv-c ul li { font-size: 0.87rem; margin-bottom: 4px; line-height: 1.5; }
    .cv-c .cv-summary { font-size: 0.89rem; line-height: 1.65; color: #4a5568; }
    .cv-c .cv-skills-grid { display: flex; flex-wrap: wrap; gap: 7px; }
    .cv-c .cv-skill-chip {
      background: #1e3a5f;
      color: white;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .cv-c .cv-edu-line { font-size: 0.88rem; margin-bottom: 3px; }
  </style>
</head>
<body>

<div class="header">
  <h1>Constructor de CV Profesional</h1>
  <p>Optimizado para ATS · Guiado paso a paso</p>
</div>

<!-- PROGRESS -->
<div class="progress-wrap">
  <div class="progress-labels" id="progressLabels">
    <span class="active">1. Personal</span>
    <span>2. Perfil</span>
    <span>3. Experiencia</span>
    <span>4. Educación</span>
    <span>5. Habilidades</span>
    <span>6. Plantilla</span>
    <span>7. CV Final</span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressFill" style="width:4%"></div>
  </div>
</div>

<!-- CHAT -->
<div class="chat-container">
  <div class="messages" id="messages"></div>
  <div class="chips-wrap" id="chipsWrap"></div>
  <div class="input-area">
    <textarea id="userInput" rows="1" placeholder="Escribe tu respuesta aquí..."></textarea>
    <button class="send-btn" id="sendBtn" title="Enviar">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- CV PREVIEW MODAL -->
<div class="cv-preview-overlay" id="cvOverlay">
  <div class="cv-preview-modal">
    <div class="cv-modal-header">
      <h2>Vista Previa de tu CV</h2>
      <button onclick="closePreview()">×</button>
    </div>
    <div class="cv-modal-body" id="cvPreviewBody"></div>
    <div class="cv-modal-footer">
      <button class="btn btn-success" onclick="downloadPDF()">⬇ Descargar PDF</button>
      <button class="btn btn-secondary" onclick="changeTemplate()">🔄 Cambiar Plantilla</button>
      <button class="btn btn-secondary" onclick="closePreview()">✏ Editar</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  STATE  — "mode" drives the entire flow (no duplicate fns)
// ============================================================
const state = {
  mode: 'p1_nombre',   // current waiting mode
  data: {
    nombre:'', ubicacion:'', titulo:'', telefono:'', linkedin:'', email:'',
    resumenFinal:'',
    experiencias:[],
    educacion:[],
    habilidades:[],
    competencias:[],
    idiomas:[],
    logros:[],
    plantilla:'A'
  },
  currentExp: {},
  currentEdu: {}
};

// ============================================================
//  UTILS
// ============================================================
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function escHtml(t){
  return String(t)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function capitalizar(t){
  if(!t) return t;
  t = t.charAt(0).toUpperCase() + t.slice(1);
  return t.replace(/([.!?]\s+)([a-záéíóúñü])/gi, function(m, sep, c){ return sep + c.toUpperCase(); });
}

function formatBullets(text){
  return text.split('\n')
    .map(l=>l.trim()).filter(l=>l)
    .map(l=>`<li>${escHtml(l.replace(/^[•\-\*]\s*/,''))}</li>`)
    .join('');
}

const STEP_MAP = {
  p1_nombre:1, p1_ubicacion:1, p1_titulo:1, p1_telefono:1, p1_linkedin:1, p1_email:1, p1_confirm:1, p1_fix:1,
  p2_raw:2, p2_confirm:2, p2_edit:2,
  p3_empresa:3, p3_puesto:3, p3_inicio:3, p3_fin:3, p3_desc:3, p3_confirm:3, p3_edit:3, p3_more:3,
  p4_grado:4, p4_institucion:4, p4_anios:4, p4_ubicacion:4, p4_more:4,
  p5_raw:5, p5_confirm:5, p5_edit:5, p5_logros:5,
  p6_plantilla:6,
  p7_done:7
};

function updateProgress(){
  const step = STEP_MAP[state.mode] || 1;
  const pct = Math.min(4 + (step-1)*14, 100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.querySelectorAll('#progressLabels span').forEach((el,i)=>{
    el.classList.toggle('active', i+1===step);
  });
}

// ============================================================
//  CHAT RENDERING
// ============================================================
const msgs = document.getElementById('messages');

function addBubble(role, html){
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap ' + role;
  const av = document.createElement('div');
  av.className = 'avatar ' + role;
  av.textContent = role === 'bot' ? 'CV' : 'Tú';
  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + role;
  bubble.innerHTML = html;
  if(role === 'bot'){ wrap.appendChild(av); wrap.appendChild(bubble); }
  else { wrap.appendChild(bubble); wrap.appendChild(av); }
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

async function botTyping(html, delay){
  if(delay === undefined) delay = 800;
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap bot';
  const av = document.createElement('div');
  av.className = 'avatar bot';
  av.textContent = 'CV';
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(av);
  wrap.appendChild(typing);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  await sleep(delay);
  wrap.removeChild(typing);
  const bubble = document.createElement('div');
  bubble.className = 'bubble bot';
  bubble.innerHTML = html;
  wrap.appendChild(bubble);
  msgs.scrollTop = msgs.scrollHeight;
}

function setChips(chips){
  const cw = document.getElementById('chipsWrap');
  cw.innerHTML = '';
  chips.forEach(function(c){
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = c;
    btn.addEventListener('click', function(){ sendMessage(c); });
    cw.appendChild(btn);
  });
}

function clearChips(){ document.getElementById('chipsWrap').innerHTML = ''; }

// ============================================================
//  SEND
// ============================================================
document.getElementById('sendBtn').addEventListener('click', function(){ sendMessage(); });
document.getElementById('userInput').addEventListener('keydown', function(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
});
document.getElementById('userInput').addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

function sendMessage(override){
  const inp = document.getElementById('userInput');
  const text = (override || inp.value).trim();
  if(!text) return;
  inp.value = '';
  inp.style.height = 'auto';
  clearChips();
  addBubble('user', escHtml(text));
  handleInput(text);
}

// ============================================================
//  SINGLE FLOW HANDLER  (mode-based state machine)
// ============================================================
async function handleInput(text){
  const t = text.toLowerCase().trim();
  const yes = t.includes('sí') || t.includes('si') || t === 'continuar' || t === 'confirmar';

  updateProgress();

  // ── PASO 1: INFORMACIÓN PERSONAL ──────────────────────────
  if(state.mode === 'p1_nombre'){
    state.data.nombre = text;
    state.mode = 'p1_ubicacion';
    await botTyping('¡Perfecto! ¿Cuál es tu <strong>ubicación actual</strong>? (ciudad y estado/país)');

  } else if(state.mode === 'p1_ubicacion'){
    state.data.ubicacion = text;
    state.mode = 'p1_titulo';
    await botTyping('Excelente. ¿Cuál es tu <strong>título profesional o puesto objetivo</strong>?<br><span class="tip">Ej: "Gerente de Logística", "Analista de Datos", "Desarrollador Full Stack"</span>');

  } else if(state.mode === 'p1_titulo'){
    state.data.titulo = text;
    state.mode = 'p1_telefono';
    await botTyping('Genial. ¿Cuál es tu <strong>número de teléfono</strong>?');

  } else if(state.mode === 'p1_telefono'){
    state.data.telefono = text;
    state.mode = 'p1_linkedin';
    await botTyping('¿Tienes una <strong>URL de LinkedIn</strong>? (escribe "omitir" si no tienes o no quieres incluirla)');

  } else if(state.mode === 'p1_linkedin'){
    state.data.linkedin = (t === 'omitir' || t === 'no') ? '' : text;
    state.mode = 'p1_email';
    await botTyping('¿Cuál es tu <strong>correo electrónico profesional</strong>?');

  } else if(state.mode === 'p1_email'){
    state.data.email = text;
    state.mode = 'p1_confirm';
    const d = state.data;
    await botTyping(
      '<div class="section-tag">Paso 1 completo ✓</div>' +
      '<strong>Resumen de tu información:</strong><br><br>' +
      '👤 <strong>Nombre:</strong> ' + escHtml(d.nombre) + '<br>' +
      '📍 <strong>Ubicación:</strong> ' + escHtml(d.ubicacion) + '<br>' +
      '💼 <strong>Título objetivo:</strong> ' + escHtml(d.titulo) + '<br>' +
      '📞 <strong>Teléfono:</strong> ' + escHtml(d.telefono) + '<br>' +
      '🔗 <strong>LinkedIn:</strong> ' + (d.linkedin ? escHtml(d.linkedin) : 'No incluido') + '<br>' +
      '✉️ <strong>Correo:</strong> ' + escHtml(d.email) + '<br><br>' +
      '¿Todo correcto? Escribe <strong>"sí"</strong> para continuar o dime qué dato corregir.'
    );
    setChips(['Sí, continuar', 'Corregir un dato']);

  } else if(state.mode === 'p1_confirm'){
    if(yes){
      state.mode = 'p2_raw';
      await botTyping(
        '<div class="section-tag">Paso 2 — Perfil Profesional</div>' +
        'Cuéntame <strong>con tus propias palabras</strong>:<br><br>' +
        '<ul>' +
        '<li>¿Cuántos años de experiencia tienes?</li>' +
        '<li>¿En qué industria o área te has desempeñado?</li>' +
        '<li>¿Cuáles son tus principales fortalezas o logros?</li>' +
        '<li>¿Qué tipo de puesto buscas ahora?</li>' +
        '</ul>' +
        '<span class="tip">No te preocupes por la redacción — yo lo convertiré en un perfil poderoso.</span>'
      );
    } else {
      state.mode = 'p1_fix';
      await botTyping('Claro, ¿qué dato necesitas corregir? Escríbelo así:<br><strong>nombre: Juan Pérez</strong> (o email, teléfono, título, linkedin, ubicación)');
    }

  } else if(state.mode === 'p1_fix'){
    const colon = text.indexOf(':');
    if(colon > -1){
      const key = text.substring(0, colon).trim().toLowerCase();
      const val = text.substring(colon + 1).trim();
      if(key.includes('nombre')) state.data.nombre = val;
      else if(key.includes('email') || key.includes('correo')) state.data.email = val;
      else if(key.includes('tel')) state.data.telefono = val;
      else if(key.includes('titul')) state.data.titulo = val;
      else if(key.includes('linked')) state.data.linkedin = val;
      else if(key.includes('ubica')) state.data.ubicacion = val;
    }
    state.mode = 'p1_confirm';
    const d = state.data;
    await botTyping(
      '¡Actualizado! Así quedaron tus datos:<br><br>' +
      '👤 ' + escHtml(d.nombre) + ' · 📍 ' + escHtml(d.ubicacion) + '<br>' +
      '💼 ' + escHtml(d.titulo) + '<br>' +
      '📞 ' + escHtml(d.telefono) + ' · ✉️ ' + escHtml(d.email) + '<br><br>' +
      '¿Todo correcto ahora?'
    );
    setChips(['Sí, continuar', 'Corregir otro dato']);

  // ── PASO 2: PERFIL PROFESIONAL ────────────────────────────
  } else if(state.mode === 'p2_raw'){
    const resumen = generarResumen(text, state.data.titulo);
    state.data.resumenFinal = resumen;
    state.mode = 'p2_confirm';
    await botTyping(
      '<div class="section-tag">Perfil Profesional Reescrito</div>' +
      '<em>' + escHtml(resumen) + '</em><br><br>' +
      '¿Te gusta esta versión? Escribe <strong>"sí"</strong> para confirmarla o dime qué cambiar.',
      1200
    );
    setChips(['Sí, me gusta', 'Hazlo más conciso', 'Hazlo más detallado']);

  } else if(state.mode === 'p2_confirm'){
    if(yes){
      state.mode = 'p3_empresa';
      await botTyping(
        '<div class="section-tag">Perfil confirmado ✓</div>' +
        '<div class="section-tag" style="margin-top:8px">Paso 3 — Experiencia Laboral</div>' +
        'Empecemos con tu <strong>experiencia más reciente</strong>.<br><br>' +
        '¿Cuál es el <strong>nombre de la empresa</strong> donde trabajaste (o trabajas)?'
      );
    } else {
      state.mode = 'p2_edit';
      await botTyping('Claro. Puedes reescribir el perfil completo como quieras que quede, o dime el ajuste específico y yo lo aplico.');
    }

  } else if(state.mode === 'p2_edit'){
    state.data.resumenFinal = text;
    state.mode = 'p3_empresa';
    await botTyping(
      '<div class="section-tag">Perfil actualizado ✓</div>' +
      'Perfil guardado. Ahora vamos con tu experiencia laboral.<br><br>' +
      '¿Cuál es el <strong>nombre de la empresa</strong> más reciente?'
    );

  // ── PASO 3: EXPERIENCIA LABORAL ───────────────────────────
  } else if(state.mode === 'p3_empresa'){
    state.currentExp = { empresa: text };
    state.mode = 'p3_puesto';
    await botTyping('¿Cuál fue tu <strong>puesto o cargo</strong> en ' + escHtml(text) + '?');

  } else if(state.mode === 'p3_puesto'){
    state.currentExp.puesto = text;
    state.mode = 'p3_inicio';
    await botTyping('¿Cuál fue tu <strong>fecha de inicio</strong>? (ej. "Enero 2020" o "01/2020")');

  } else if(state.mode === 'p3_inicio'){
    state.currentExp.inicio = text;
    state.mode = 'p3_fin';
    await botTyping('¿Cuál fue tu <strong>fecha de fin</strong>? (escribe "Actual" si sigues ahí)');

  } else if(state.mode === 'p3_fin'){
    state.currentExp.fin = text;
    state.mode = 'p3_desc';
    await botTyping(
      'Perfecto. Ahora descríbeme brevemente:<br><br>' +
      '<ul>' +
      '<li>¿Cuáles eran tus <strong>principales funciones</strong>?</li>' +
      '<li>¿Qué <strong>herramientas o sistemas</strong> usabas?</li>' +
      '<li>¿Qué <strong>resultados o logros</strong> obtuviste?</li>' +
      '</ul>' +
      '<span class="tip">Entre más detalle, mejores quedarán tus bullets.</span>'
    );

  } else if(state.mode === 'p3_desc'){
    const exp = state.currentExp;
    exp.descripcion = text;
    exp.bullets = generarBullets(exp);
    state.data.experiencias.push(Object.assign({}, exp));
    state.mode = 'p3_confirm';
    await botTyping(
      '<div class="section-tag">Experiencia Reescrita — Formato CAR</div>' +
      '<strong>' + escHtml(exp.empresa) + '</strong> · ' + escHtml(exp.puesto) + '<br>' +
      '<em>' + escHtml(exp.inicio) + ' – ' + escHtml(exp.fin) + '</em><br><br>' +
      '<ul>' + formatBullets(exp.bullets) + '</ul><br>' +
      '¿Te parece bien? Escribe <strong>"sí"</strong> para confirmar o dime qué ajustar.',
      1400
    );
    setChips(['Sí, confirmar', 'Cambiar redacción']);

  } else if(state.mode === 'p3_confirm'){
    if(yes){
      state.mode = 'p3_more';
      await botTyping(
        '<div class="section-tag">Experiencia guardada ✓</div>' +
        '¿Tienes <strong>otra experiencia laboral</strong> que agregar?'
      );
      setChips(['Sí, agregar otra', 'No, continuar']);
    } else {
      state.mode = 'p3_edit';
      await botTyping('Entendido. Reescribe los bullets como quieres que queden (uno por línea) o dime el cambio puntual.');
    }

  } else if(state.mode === 'p3_edit'){
    state.data.experiencias[state.data.experiencias.length - 1].bullets = text;
    state.mode = 'p3_more';
    await botTyping(
      '<div class="section-tag">Experiencia actualizada ✓</div>' +
      '¿Tienes <strong>otra experiencia laboral</strong> que agregar?'
    );
    setChips(['Sí, agregar otra', 'No, continuar']);

  } else if(state.mode === 'p3_more'){
    if(yes){
      state.currentExp = {};
      state.mode = 'p3_empresa';
      await botTyping('¿Cuál es el <strong>nombre de la siguiente empresa</strong>?');
    } else {
      state.mode = 'p4_grado';
      state.currentEdu = {};
      await botTyping(
        '<div class="section-tag">Paso 4 — Educación</div>' +
        '¿Cuál es el <strong>nombre de tu grado o certificación</strong>?<br>' +
        '<span class="tip">Ej: "Licenciatura en Administración", "Certificación PMP", "MBA"</span>'
      );
    }

  // ── PASO 4: EDUCACIÓN ─────────────────────────────────────
  } else if(state.mode === 'p4_grado'){
    state.currentEdu = { grado: text };
    state.mode = 'p4_institucion';
    await botTyping('¿Cuál es el <strong>nombre de la institución</strong>?');

  } else if(state.mode === 'p4_institucion'){
    state.currentEdu.institucion = text;
    state.mode = 'p4_anios';
    await botTyping('¿En qué <strong>años estudiaste</strong>? (ej. "2015 – 2019" o "2018")');

  } else if(state.mode === 'p4_anios'){
    state.currentEdu.anios = text;
    state.mode = 'p4_ubicacion';
    await botTyping('¿Cuál es la <strong>ubicación</strong> de la institución? (ciudad/país — escribe "omitir" si no quieres incluirla)');

  } else if(state.mode === 'p4_ubicacion'){
    state.currentEdu.ubicacion = (t === 'omitir') ? '' : text;
    state.data.educacion.push(Object.assign({}, state.currentEdu));
    state.mode = 'p4_more';
    const edu = state.currentEdu;
    await botTyping(
      '<div class="section-tag">Educación guardada ✓</div>' +
      '<strong>' + escHtml(edu.grado) + '</strong><br>' +
      escHtml(edu.institucion) + (edu.ubicacion ? ' — ' + escHtml(edu.ubicacion) : '') + ' · ' + escHtml(edu.anios) + '<br><br>' +
      '¿Tienes <strong>otra formación o certificación</strong> que agregar?'
    );
    setChips(['Sí, agregar otra', 'No, continuar']);

  } else if(state.mode === 'p4_more'){
    if(yes){
      state.currentEdu = {};
      state.mode = 'p4_grado';
      await botTyping('¿Cuál es el nombre del siguiente <strong>grado o certificación</strong>?');
    } else {
      state.mode = 'p5_raw';
      await botTyping(
        '<div class="section-tag">Paso 5 — Competencias y Habilidades</div>' +
        'Lista todas tus <strong>competencias clave y habilidades técnicas</strong>:<br><br>' +
        '<ul>' +
        '<li>Software o herramientas (ej. Excel, SAP, AutoCAD)</li>' +
        '<li>Metodologías (ej. Agile, Lean, Six Sigma)</li>' +
        '<li>Idiomas (ej. Español nativo, Inglés avanzado)</li>' +
        '<li>Habilidades blandas (ej. Liderazgo, Negociación)</li>' +
        '</ul>' +
        '<span class="tip">Sepáralas con comas o escríbelas en líneas distintas.</span>'
      );
    }

  // ── PASO 5: HABILIDADES ───────────────────────────────────
  } else if(state.mode === 'p5_raw'){
    organizarHabilidades(text);
    const preview =
      (state.data.habilidades.length  ? '<strong>Habilidades:</strong> ' + state.data.habilidades.join(', ') + '<br>' : '') +
      (state.data.competencias.length ? '<strong>Competencias:</strong> ' + state.data.competencias.join(', ') + '<br>' : '') +
      (state.data.idiomas.length      ? '<strong>Idiomas:</strong> ' + state.data.idiomas.join(', ') + '<br>' : '');
    state.mode = 'p5_confirm';
    await botTyping(
      '<div class="section-tag">Habilidades Organizadas</div>' +
      preview + '<br>' +
      '¿Te parece bien? Escribe <strong>"sí"</strong> para confirmar o dime qué cambiar.',
      1000
    );
    setChips(['Sí, confirmar', 'Modificar']);

  } else if(state.mode === 'p5_confirm'){
    if(yes){
      state.mode = 'p5_logros';
      await botTyping(
        '<div class="section-tag">Logros Destacados</div>' +
        'Ahora dime tus <strong>principales logros profesionales</strong> (uno por línea o separados por comas).<br><br>' +
        '<span class="tip">Ej: "Reduje costos operativos en 30%, Lideré equipo de 15 personas, Incrementé ventas 40% en 6 meses"</span>'
      );
    } else {
      state.mode = 'p5_edit';
      await botTyping('Escríbeme las habilidades corregidas (separadas por comas) y yo las reorganizo.');
    }

  } else if(state.mode === 'p5_edit'){
    organizarHabilidades(text);
    state.mode = 'p5_logros';
    await botTyping(
      '<div class="section-tag">Habilidades actualizadas ✓</div>' +
      'Ahora dime tus <strong>principales logros profesionales</strong> (uno por línea o separados por comas).<br>' +
      '<span class="tip">Ej: "Reduje costos 30%, Lancé producto con ventas de $500k"</span>'
    );

  } else if(state.mode === 'p5_logros'){
    state.data.logros = text.split(/[,\n;]+/).map(function(s){ return capitalizar(s.trim()); }).filter(function(s){ return s; });
    state.mode = 'p6_plantilla';
    await botTyping(
      '<div class="section-tag">Logros guardados ✓</div>' +
      'Perfecto. Ahora elige tu plantilla:<br><br>' +
      '<strong>🅐 Ejecutivo Clásico</strong> — Columna única, paleta azul marino. Ideal para roles corporativos y senior.<br><br>' +
      '<strong>🅑 Moderno Dividido</strong> — Dos columnas con barra lateral oscura. Ideal para tecnología y logística.<br><br>' +
      '<strong>🅒 Minimalista Bold</strong> — Franja de color en header. Ideal para roles creativos y comerciales.<br><br>' +
      '¿Cuál prefieres? (A, B o C)',
      900
    );
    setChips(['A — Ejecutivo Clásico', 'B — Moderno Dividido', 'C — Minimalista Bold']);

  // ── PASO 6: PLANTILLA ─────────────────────────────────────
  } else if(state.mode === 'p6_plantilla'){
    const tu = text.toUpperCase();
    if(tu.includes('A')) state.data.plantilla = 'A';
    else if(tu.includes('B')) state.data.plantilla = 'B';
    else if(tu.includes('C')) state.data.plantilla = 'C';
    else {
      await botTyping('Por favor elige <strong>A</strong>, <strong>B</strong> o <strong>C</strong>.');
      setChips(['A', 'B', 'C']);
      return;
    }
    const nombres = { A: 'Ejecutivo Clásico', B: 'Moderno Dividido', C: 'Minimalista Bold' };
    state.mode = 'p7_done';
    await botTyping(
      '<div class="section-tag">Plantilla ' + state.data.plantilla + ' seleccionada ✓</div>' +
      '¡Todo listo! Generando tu CV <strong>' + nombres[state.data.plantilla] + '</strong>...',
      600
    );
    await sleep(600);
    showCVPreview();

  // ── PASO 7: POST-ACCIONES ─────────────────────────────────
  } else if(state.mode === 'p7_done'){
    if(t.includes('ver') || t.includes('preview')){
      showCVPreview();
    } else if(t.includes('plantilla') || t.includes('cambiar')){
      state.mode = 'p6_plantilla';
      await botTyping('¿Qué plantilla prefieres ahora? (A, B o C)');
      setChips(['A — Ejecutivo Clásico', 'B — Moderno Dividido', 'C — Minimalista Bold']);
    } else {
      showCVPreview();
    }
  }
}

// ============================================================
//  HELPERS DE CONTENIDO
// ============================================================
function generarResumen(raw, titulo){
  const yrs = raw.match(/(\d+)\s*a[ñn]/i);
  const yrStr = yrs ? yrs[1] + ' años de experiencia' : 'Amplia experiencia';
  return capitalizar('Profesional con ' + yrStr + ' en el área de ' + titulo + ', con sólida trayectoria en la gestión de proyectos, optimización de procesos y generación de resultados medibles. Destaca por su capacidad analítica, liderazgo de equipos multidisciplinarios y orientación estratégica alineada a los objetivos organizacionales. Reconocido por su habilidad para implementar soluciones innovadoras que incrementan la eficiencia operativa y la rentabilidad del negocio. Busca contribuir su experiencia y competencias en un rol que potencie el crecimiento sostenible de la organización.');
}

function generarBullets(exp){
  const p = capitalizar(exp.puesto);
  return '• Lideré las operaciones del área de ' + p + ', optimizando procesos internos y reduciendo tiempos de ciclo en un 20%.\n' +
    '• Implementé metodologías que incrementaron la productividad del equipo en más del 15% en un período de 6 meses.\n' +
    '• Gestioné relaciones con clientes y proveedores clave, manteniendo un índice de satisfacción superior al 90%.\n' +
    '• Coordiné proyectos multidisciplinarios cumpliendo plazos y presupuestos establecidos.\n' +
    '• Generé reportes ejecutivos y análisis de KPIs que apoyaron la toma de decisiones estratégicas.';
}

function organizarHabilidades(raw){
  const items = raw.split(/[,\n;]+/).map(function(s){ return capitalizar(s.trim()); }).filter(function(s){ return s; });
  const tools = [], comp = [], lang = [];
  const compKws = ['liderazgo','comunicación','negociación','equipo','gestión','planificación','proactividad','adaptabilidad','creatividad','organización','pensamiento','resolución'];
  const langKws = ['español','inglés','francés','portugués','alemán','chino','árabe','nativo','avanzado','intermedio','básico','bilingüe'];
  items.forEach(function(i){
    const il = i.toLowerCase();
    if(langKws.some(function(k){ return il.includes(k); })) lang.push(i);
    else if(compKws.some(function(k){ return il.includes(k); })) comp.push(i);
    else tools.push(i);
  });
  state.data.habilidades = tools;
  state.data.competencias = comp;
  state.data.idiomas = lang;
}

// ============================================================
//  CV PREVIEW & PDF
// ============================================================
function showCVPreview(){
  document.getElementById('cvPreviewBody').innerHTML = buildCV(state.data.plantilla);
  document.getElementById('cvOverlay').classList.add('open');
}

function closePreview(){
  document.getElementById('cvOverlay').classList.remove('open');
  state.mode = 'p7_done';
  botTyping(
    '<div class="section-tag">Tu CV está listo 🎉</div>' +
    'Opciones:<br>' +
    '<strong>(a)</strong> Ver CV de nuevo<br>' +
    '<strong>(b)</strong> Cambiar plantilla<br>' +
    '<strong>(c)</strong> Descargar PDF desde la vista previa'
  );
  setChips(['Ver CV de nuevo', 'Cambiar plantilla']);
}

function changeTemplate(){
  document.getElementById('cvOverlay').classList.remove('open');
  state.mode = 'p6_plantilla';
  setTimeout(function(){
    botTyping('¿Qué plantilla prefieres? (A, B o C)');
    setChips(['A — Ejecutivo Clásico', 'B — Moderno Dividido', 'C — Minimalista Bold']);
  }, 200);
}

function downloadPDF(){
  const el = document.getElementById('cvPreviewBody');
  const pri = window.open('', '_blank', 'width=900,height=700');
  if(!pri){ alert('Permite ventanas emergentes para descargar el PDF.'); return; }
  let css = '';
  try {
    for(const sheet of document.styleSheets){
      for(const rule of sheet.cssRules){ css += rule.cssText; }
    }
  } catch(e){}
  pri.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>CV - ' + escHtml(state.data.nombre) + '</title><style>body{margin:0;padding:0;}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}' + css + '</style></head><body>');
  pri.document.write(el.innerHTML);
  pri.document.write('</body></html>');
  pri.document.close();
  pri.focus();
  setTimeout(function(){ pri.print(); }, 600);
}

// ============================================================
//  CV BUILDERS
// ============================================================
function expHtml(exps, cls){
  return exps.map(function(e){
    return '<div style="margin-bottom:16px">' +
      '<div class="' + cls + '-job-header">' +
        '<span class="' + cls + '-company">' + escHtml(e.empresa) + '</span>' +
        '<span class="' + cls + '-dates">' + escHtml(e.inicio) + ' – ' + escHtml(e.fin) + '</span>' +
      '</div>' +
      '<div class="' + cls + '-role">' + escHtml(e.puesto) + '</div>' +
      '<ul>' + formatBullets(e.bullets) + '</ul>' +
    '</div>';
  }).join('');
}

function eduHtml(edus, cls){
  return edus.map(function(e){
    return '<div class="' + cls + '-edu-line"><strong>' + escHtml(e.grado) + '</strong> — ' +
      escHtml(e.institucion) + (e.ubicacion ? ' · ' + escHtml(e.ubicacion) : '') + ' · ' + escHtml(e.anios) + '</div>';
  }).join('');
}

function chipsHtml(arr, chipClass){
  return arr.map(function(s){ return '<span class="' + chipClass + '">' + escHtml(s) + '</span>'; }).join('');
}

function logrosHtml(arr, cls){
  if(!arr || !arr.length) return '';
  return '<ul>' + arr.map(function(l){ return '<li>' + escHtml(capitalizar(l)) + '</li>'; }).join('') + '</ul>';
}

function seccionesSkillsA(d){
  let html = '';
  if(d.habilidades.length)  html += '<hr class="cv-divider"><div class="cv-section-title">Habilidades Técnicas</div><div class="cv-skills-grid">' + chipsHtml(d.habilidades, 'cv-skill-chip') + '</div>';
  if(d.competencias.length) html += '<hr class="cv-divider"><div class="cv-section-title">Competencias</div><div class="cv-skills-grid">' + chipsHtml(d.competencias, 'cv-skill-chip') + '</div>';
  if(d.idiomas.length)      html += '<hr class="cv-divider"><div class="cv-section-title">Idiomas</div><div class="cv-skills-grid">' + chipsHtml(d.idiomas, 'cv-skill-chip') + '</div>';
  if(d.logros.length)       html += '<hr class="cv-divider"><div class="cv-section-title">Logros Destacados</div>' + logrosHtml(d.logros, 'cv-a');
  return html;
}

function seccionesSkillsC(d){
  let html = '';
  if(d.habilidades.length)  html += '<div class="cv-section"><div class="cv-section-title">Habilidades Técnicas</div><div class="cv-skills-grid">' + chipsHtml(d.habilidades, 'cv-skill-chip') + '</div></div>';
  if(d.competencias.length) html += '<div class="cv-section"><div class="cv-section-title">Competencias</div><div class="cv-skills-grid">' + chipsHtml(d.competencias, 'cv-skill-chip') + '</div></div>';
  if(d.idiomas.length)      html += '<div class="cv-section"><div class="cv-section-title">Idiomas</div><div class="cv-skills-grid">' + chipsHtml(d.idiomas, 'cv-skill-chip') + '</div></div>';
  if(d.logros.length)       html += '<div class="cv-section"><div class="cv-section-title">Logros Destacados</div>' + logrosHtml(d.logros, 'cv-c') + '</div>';
  return html;
}

function buildCV(tpl){
  const d = state.data;

  if(tpl === 'A'){
    return '<div class="cv-a">' +
      '<div class="cv-name">' + escHtml(capitalizar(d.nombre)) + '</div>' +
      '<div class="cv-title">' + escHtml(capitalizar(d.titulo)) + '</div>' +
      '<div class="cv-contact"><span>📞 ' + escHtml(d.telefono) + '</span><span>✉️ ' + escHtml(d.email) + '</span><span>📍 ' + escHtml(capitalizar(d.ubicacion)) + '</span>' + (d.linkedin ? '<span>🔗 ' + escHtml(d.linkedin) + '</span>' : '') + '</div>' +
      '<hr class="cv-divider"><div class="cv-section-title">Perfil Profesional</div>' +
      '<p style="font-size:0.87rem;line-height:1.65;color:#333;">' + escHtml(d.resumenFinal) + '</p>' +
      '<hr class="cv-divider"><div class="cv-section-title">Experiencia Laboral</div>' + expHtml(d.experiencias, 'cv-a') +
      '<hr class="cv-divider"><div class="cv-section-title">Educación</div>' + eduHtml(d.educacion, 'cv-a') +
      seccionesSkillsA(d) +
    '</div>';
  }

  if(tpl === 'B'){
    return '<div class="cv-b">' +
      '<div class="cv-sidebar">' +
        '<div class="cv-name">' + escHtml(capitalizar(d.nombre)) + '</div>' +
        '<div class="cv-title">' + escHtml(capitalizar(d.titulo)) + '</div>' +
        '<div class="cv-sidebar-section"><div class="cv-sidebar-title">Contacto</div>' +
          '<div class="cv-contact-item">📞 ' + escHtml(d.telefono) + '</div>' +
          '<div class="cv-contact-item">✉️ ' + escHtml(d.email) + '</div>' +
          '<div class="cv-contact-item">📍 ' + escHtml(capitalizar(d.ubicacion)) + '</div>' +
          (d.linkedin ? '<div class="cv-contact-item">🔗 ' + escHtml(d.linkedin) + '</div>' : '') +
        '</div>' +
        (d.habilidades.length ? '<div class="cv-sidebar-section"><div class="cv-sidebar-title">Habilidades</div>' + d.habilidades.map(function(s){ return '<div class="cv-skill-item">' + escHtml(s) + '</div>'; }).join('') + '</div>' : '') +
        (d.competencias.length ? '<div class="cv-sidebar-section"><div class="cv-sidebar-title">Competencias</div>' + d.competencias.map(function(s){ return '<div class="cv-skill-item">' + escHtml(s) + '</div>'; }).join('') + '</div>' : '') +
        (d.idiomas.length ? '<div class="cv-sidebar-section"><div class="cv-sidebar-title">Idiomas</div>' + d.idiomas.map(function(s){ return '<div class="cv-skill-item">' + escHtml(s) + '</div>'; }).join('') + '</div>' : '') +
      '</div>' +
      '<div class="cv-main">' +
        '<div class="cv-main-section"><div class="cv-section-title">Perfil Profesional</div><p class="cv-summary">' + escHtml(d.resumenFinal) + '</p></div>' +
        '<div class="cv-main-section"><div class="cv-section-title">Experiencia Laboral</div>' + expHtml(d.experiencias, 'cv-b') + '</div>' +
        '<div class="cv-main-section"><div class="cv-section-title">Educación</div>' + eduHtml(d.educacion, 'cv-b') + '</div>' +
        (d.logros.length ? '<div class="cv-main-section"><div class="cv-section-title">Logros Destacados</div>' + logrosHtml(d.logros, 'cv-b') + '</div>' : '') +
      '</div>' +
    '</div>';
  }

  // Plantilla C
  return '<div class="cv-c">' +
    '<div class="cv-header-band">' +
      '<div class="cv-name">' + escHtml(capitalizar(d.nombre)) + '</div>' +
      '<div class="cv-title">' + escHtml(capitalizar(d.titulo)) + '</div>' +
      '<div class="cv-contact"><span>📞 ' + escHtml(d.telefono) + '</span><span>✉️ ' + escHtml(d.email) + '</span><span>📍 ' + escHtml(capitalizar(d.ubicacion)) + '</span>' + (d.linkedin ? '<span>🔗 ' + escHtml(d.linkedin) + '</span>' : '') + '</div>' +
    '</div>' +
    '<div class="cv-body">' +
      '<div class="cv-section"><div class="cv-section-title">Perfil Profesional</div><p class="cv-summary">' + escHtml(d.resumenFinal) + '</p></div>' +
      '<div class="cv-section"><div class="cv-section-title">Experiencia Laboral</div>' + expHtml(d.experiencias, 'cv-c') + '</div>' +
      '<div class="cv-section"><div class="cv-section-title">Educación</div>' + eduHtml(d.educacion, 'cv-c') + '</div>' +
      seccionesSkillsC(d) +
    '</div>' +
  '</div>';
}
